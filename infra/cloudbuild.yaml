steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"
      - -f
      - backend/Dockerfile.production
      - backend

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: push
    waitFor: ["build"]
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy
    waitFor: ["push"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8000"
      - --min-instances
      - "0"
      - --max-instances
      - "10"
      - --memory
      - "2Gi"
      - --cpu
      - "2"
      - --concurrency
      - "80"
      - --timeout
      - "120"
      - --set-secrets
      - "ODIN_ANTHROPIC_API_KEY=odin-anthropic-api-key:latest"
      - --set-env-vars
      - "ODIN_ENVIRONMENT=production,ODIN_LOG_LEVEL=INFO"

substitutions:
  _REGION: us-central1
  _REPO: odin
  _SERVICE: odin-backend

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
